# Server
server.port=8080

# Database (Postgres) - uses env vars with defaults
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:caesars_gambit}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:change_this_in_dev_at_least_32_chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# CORS (frontend running on 3000)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
