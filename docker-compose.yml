version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: caesars_gambit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./Backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: caesars_gambit
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dein_geheimer_jwt_key_32_chars_min
      JWT_EXPIRATION_MS: 3600000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000
    depends_on:
      - db

  frontend:
    build: ./Frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  db-data:
