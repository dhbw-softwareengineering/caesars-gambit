version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: caesars_gambit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "8081:8080"

volumes:
  db-data:
