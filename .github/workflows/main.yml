name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io/knoepsim  # Dein Docker Hub Username
  FRONTEND_IMAGE: ${{ env.REGISTRY }}/caesars-gambit-frontend
  BACKEND_IMAGE: ${{ env.REGISTRY }}/caesars-gambit-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Frontend: Next.js in Frontend/caesars-gambit
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'  # Falls du pnpm nutzt [memory:26]

      - name: Install frontend dependencies
        working-directory: ./Frontend/caesars-gambit
        run: |
          npm ci  # oder pnpm install

      - name: Run frontend tests
        working-directory: ./Frontend/caesars-gambit
        run: npm test

      - name: Build frontend
        working-directory: ./Frontend/caesars-gambit
        run: npm run build

      # Backend: Spring Boot in Backend
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Validate Gradle wrapper (falls Gradle)
        working-directory: ./Backend
        run: ./gradlew wrapper --gradle-version 8.5  # Anpassen falls Maven

      - name: Build and test backend
        working-directory: ./Backend
        run: |
          ./gradlew test build  # oder ./mvnw test package

      # Docker login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Frontend Image
      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend/caesars-gambit
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # Build & Push Backend Image
      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  deploy-portainer:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Portainer
        uses: rossf7/docker-stack-deploy@master  # Portainer Stack Deploy Action [web:15]
        env:
          PORTAINER_DOCKER_CONTEXT: local  # oder remote
          PORTAINER_HOST: ${{ secrets.PORTAINER_URL }}
          PORTAINER_USERNAME: ${{ secrets.PORTAINER_USERNAME }}
          PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}
          STACK_NAME: caesars-gambit
        with:
          compose-file-path: docker-compose.yml  # Erstelle diese Datei
