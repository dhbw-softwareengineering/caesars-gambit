name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: knoepsim

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'Backend/**'
            frontend:
              - 'Frontend/caesars-gambit/**'

  build-backend:
    if: ${{ needs.check-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build backend with Maven
        working-directory: ./Backend
        run: mvn clean package -DskipTests

      - name: Save backend Docker context
        uses: actions/upload-artifact@v3
        with:
          name: backend-context
          path: ./Backend

  build-frontend:
    if: ${{ needs.check-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        working-directory: ./Frontend/caesars-gambit
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./Frontend/caesars-gambit
        run: pnpm build

      - name: Save frontend Docker context
        uses: actions/upload-artifact@v3
        with:
          name: frontend-context
          path: ./Frontend/caesars-gambit

  push-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Download backend Docker context
        uses: actions/download-artifact@v3
        with:
          name: backend-context

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/caesars-gambit-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/caesars-gambit-backend:${{ github.sha }}

  push-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Download frontend Docker context
        uses: actions/download-artifact@v3
        with:
          name: frontend-context

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend/caesars-gambit
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/caesars-gambit-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/caesars-gambit-frontend:${{ github.sha }}

  # Optional: Deploy to Portainer
  deploy:
    needs: push-backend, push-frontend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Portainer via Webhook
        run: |
          curl -X POST "${{ secrets.PORTAINER_URL }}/api/stacks/webhooks/2f5e3910-38b0-494c-9678-fe8cdb7547e6"
        continue-on-error: true
