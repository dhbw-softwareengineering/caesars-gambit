name: CI/CD

on:
  push:
    branches: [main, CI/CD]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Validierung bei jedem Push und PR ──────────────────────────────────
  test-backend:
    name: Backend - Compile & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile and run tests
        working-directory: ./Backend
        run: mvn package -DskipTests   # Tests überspringen bis Testcontainers eingerichtet sind

  test-frontend:
    name: Frontend - Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: Frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./Frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ./Frontend
        run: pnpm lint
        continue-on-error: true

      - name: Type check
        working-directory: ./Frontend
        run: npx tsc --noEmit
        continue-on-error: true

  # ── CD: Docker-Images bauen & nach GHCR pushen ────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./Backend
            image: caesars-gambit-backend
          - name: frontend
            context: ./Frontend
            image: caesars-gambit-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # automatisch verfügbar, kein Secret nötig

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:buildcache,mode=max

  # ── CD: Portainer-Stack neu laden ─────────────────────────────────────────
  deploy:
    name: Deploy via Portainer Webhook
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer stack webhook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          echo "Portainer response: $HTTP_STATUS"
          [[ "$HTTP_STATUS" =~ ^2 ]] || { echo "Webhook failed"; exit 1; }
