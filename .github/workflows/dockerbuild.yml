name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: knoepsim

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        working-directory: ./Frontend/caesars-gambit
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./Frontend/caesars-gambit
        run: pnpm build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend/caesars-gambit
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/caesars-gambit-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/caesars-gambit-frontend:${{ github.sha }}

      - name: Build backend with Maven
        working-directory: ./Backend
        run: mvn clean package -DskipTests

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/caesars-gambit-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/caesars-gambit-backend:${{ github.sha }}
