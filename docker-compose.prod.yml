version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: caesars_gambit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    image: knoepsim/caesars-gambit-backend:latest
    ports:
      - "3021:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: caesars_gambit
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 3600000
      CORS_ALLOWED_ORIGINS: https://caesars-gambit.knoep.de
    depends_on:
      - db

  frontend:
    image: knoepsim/caesars-gambit-frontend:latest
    ports:
      - "3020:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend

volumes:
  db-data:
