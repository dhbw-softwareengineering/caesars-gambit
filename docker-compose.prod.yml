version: '3.8'
services:
  db:
    image: postgres:15
    labels:
      com.centurylinklabs.watchtower.enable: "true" # Watchtower überwacht diesen Container
    environment:
      POSTGRES_DB: caesars_gambit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    image: knoepsim/caesars-gambit-backend:latest
    labels:
      com.centurylinklabs.watchtower.enable: "true" # Watchtower überwacht diesen Container
    ports:
      - "3021:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: caesars_gambit
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 3600000
      CORS_ALLOWED_ORIGINS: https://caesars-gambit.knoep.de
    depends_on:
      - db

  frontend:
    image: knoepsim/caesars-gambit-frontend:latest
    labels:
      com.centurylinklabs.watchtower.enable: "true" # Watchtower überwacht diesen Container
    ports:
      - "3020:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend

  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true" # Entfernt alte Images
      WATCHTOWER_POLL_INTERVAL: "300" # Überprüft alle 5 Minuten auf Updates
      WATCHTOWER_INCLUDE_STOPPED: "true" # Aktualisiert auch gestoppte Container
      WATCHTOWER_LABEL_ENABLE: "true" # Überwacht nur Container mit Labels
    restart: always

volumes:
  db-data:
